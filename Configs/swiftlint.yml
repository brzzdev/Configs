explicit_init:
  include_bare_init: true

large_tuple:
  warning: 3
  error: 4

trailing_comma:
  mandatory_comma: true

type_name:
  min_length: 0
  max_length: 1000
  allowed_symbols: [_]

excluded:
  - Carthage
  - Pods
  - "**/.build"
  - .git
  - "*.generated.swift"

custom_rules:
  no_objcMembers:
    name: "@objcMembers"
    regex: "@objcMembers"
    message: "Explicitly use @objc on each member you want to expose to Objective-C"
    severity: error
  disable_print:
    included: ".*\\.swift"
    name: "Print usage"
    regex: "(\\bprint|\\bdebugPrint|\\bdump|Swift\\.print|Swift\\.debugPrint|Swift\\.dump)\\s*\\("
    match_kinds:
      - identifier
    message: "Don't commit `print(…)`, `debugPrint(…)`, or `dump(…)` as they write to standard out in release. Use a logger`"
    severity: warning
